<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分数の計算プリント</title>
    <link rel="stylesheet" href="bunsu-1.css?v=4">
	<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-svg.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body>
<canvas id="qr"></canvas>

	<p style="margin-left: 1em; font-size:9pt;">分数の計算問題 (全20問) です。回答は約分しなくてよいです。仮分数のままでよいです (帯分数にしなくてよいです)。</p>
<header id="toolbar">
    <div class="toolbar-group">
        <strong>演算</strong>
        <label><input type="checkbox" value="plus"> 足し算</label>
        <label><input type="checkbox" value="minus"> 引き算</label>
        <span>Seed: <span id="seedLabel"></span></span>
    </div>

    <div class="toolbar-group">
        <button id="generateButton">再生成</button>
        <button id="printButton">印刷</button>
    </div>
</header>

<main>

<table id="sheet">
    <colgroup>
        <col style="width:33.3%">
        <col style="width:33.3%">
        <col style="width:33.3%">
    </colgroup>

    <thead>
        <tr>
            <th>1～10</th>
            <th>11～20</th>
            <th>解答</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td class="problem-cell">
                <div id="problems1" class="problem-list"></div>
            </td>
            <td class="problem-cell">
                <div id="problems2" class="problem-list"></div>
            </td>
            <td class="answer-cell">
                <div class="answer-grid">
                    <div class="answer-column">
                        <div class="answer-title">1～10</div>
                        <div id="answers1" class="answer-list"></div>
                    </div>
                    <div class="answer-column">
                        <div class="answer-title">11～20</div>
                        <div id="answers2" class="answer-list"></div>
                    </div>
                </div>
            </td>
        </tr>
    </tbody>
</table>
</main>

<script src="bunsu-1.js"></script>

</body>
</html>
